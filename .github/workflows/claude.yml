name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup project
        run: |
          npm run setup
          npm run dev:daemon 2>&1 | tee logs.txt &

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          custom_instructions: |
            The project is already set up and running. The dev server is available at http://localhost:3000.
            Server logs are written to logs.txt. The sqlite3 CLI is available for database inspection.
            Use mcp__playwright tools for all browser interaction and UI testing.

          mcp_config: |
            {
              "mcpServers": {
                "playwright": {
                  "command": "npx",
                  "args": ["@playwright/mcp@latest", "--allowed-origins", "localhost:3000,cdn.tailwindcss.com,esm.sh"]
                }
              }
            }

          allowed_tools: |
            Bash(npm:*)
            Bash(sqlite3:*)
            mcp__playwright__browser_click
            mcp__playwright__browser_close
            mcp__playwright__browser_console_messages
            mcp__playwright__browser_drag
            mcp__playwright__browser_evaluate
            mcp__playwright__browser_file_upload
            mcp__playwright__browser_fill_form
            mcp__playwright__browser_handle_dialog
            mcp__playwright__browser_hover
            mcp__playwright__browser_navigate
            mcp__playwright__browser_navigate_back
            mcp__playwright__browser_network_requests
            mcp__playwright__browser_press_key
            mcp__playwright__browser_resize
            mcp__playwright__browser_run_code
            mcp__playwright__browser_select_option
            mcp__playwright__browser_snapshot
            mcp__playwright__browser_tabs
            mcp__playwright__browser_take_screenshot
            mcp__playwright__browser_type
            mcp__playwright__browser_wait_for

